<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('styles'); ?>
  <style>
    body { background: #020617; }
    .board-container {
      max-width: 100%;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    .board-label {
      font-size: 2rem;
      opacity: 0.8;
      margin-bottom: 16px;
    }
    .board-number {
      font-size: 14rem;
      font-weight: 900;
      line-height: 1;
      margin: 0;
      color: #facc15;
    }
    .board-number.pulse {
      animation: pulse 0.8s ease-out;
    }
    @keyframes pulse {
      0% { transform: scale(1.15); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }
    .next-label {
      font-size: 1.5rem;
      opacity: 0.7;
      margin-top: 48px;
    }
    .next-strip {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .next-chip {
      font-size: 3rem;
      font-weight: 700;
      background: #1e293b;
      border-radius: 16px;
      padding: 16px 28px;
    }
  </style>
</head>
<body>
  <div class="board-container">
    <p class="board-label">กำลังเรียกคิว</p>
    <p id="nowServing" class="board-number">-</p>
    <p class="next-label">ถัดไป</p>
    <div id="nextStrip" class="next-strip"></div>
  </div>

  <script>
    var POLL_INTERVAL_MS = 5000;
    var lastNowServing = null;

    function render(state) {
      var el = document.getElementById('nowServing');
      var displayValue = state.nowServing !== null ? state.nowServing : '-';

      if (lastNowServing !== null && state.nowServing !== lastNowServing) {
        el.classList.remove('pulse');
        void el.offsetWidth; // restart the CSS animation
        el.classList.add('pulse');
      }
      lastNowServing = state.nowServing;
      el.textContent = displayValue;

      var strip = document.getElementById('nextStrip');
      strip.innerHTML = '';
      state.next.forEach(function (number) {
        var chip = document.createElement('div');
        chip.className = 'next-chip';
        chip.textContent = number;
        strip.appendChild(chip);
      });
    }

    function poll() {
      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(function () {})
        .getBoardState();
    }

    poll();
    setInterval(poll, POLL_INTERVAL_MS);
  </script>
</body>
</html>
